name: Test Comment Service

permissions:
    contents: read

on:
    pull_request:
        paths:
            - "comment_service/**"
            - "shared/s3-utils/**"
            - ".github/workflows/test-comment-service.yml"
    push:
        branches:
            - main
        paths:
            - "comment_service/**"
            - "shared/s3-utils/**"
            - ".github/workflows/test-comment-service.yml"

jobs:
    test-comment-service:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "24"
                  cache: "npm"
                  cache-dependency-path: |
                      comment_service/package-lock.json
                      shared/s3-utils/package-lock.json

            - name: Install and build s3-utils
              working-directory: ./shared/s3-utils
              run: npm ci && npm run build

            - name: Install dependencies
              working-directory: ./comment_service
              run: npm ci

            - name: Run quality checks (lint + format + test with coverage)
              working-directory: ./comment_service
              run: npm run check
              env:
                  NODE_ENV: test
                  CI: true
