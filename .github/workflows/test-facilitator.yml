name: Test x402 Facilitator Functions

permissions:
  contents: read

on:
  pull_request:
    paths:
      - "x402_facilitator/**"
      - "shared/chain-utils/**"
      - ".github/workflows/test-facilitator.yml"
  push:
    branches:
      - main
    paths:
      - "x402_facilitator/**"
      - "shared/chain-utils/**"
      - ".github/workflows/test-facilitator.yml"

jobs:
  test-facilitator:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: |
            x402_facilitator/package-lock.json
            shared/chain-utils/package-lock.json

      - name: Build chain-utils dependency
        working-directory: ./shared/chain-utils
        run: npm ci && npm run build

      - name: Install dependencies
        working-directory: ./x402_facilitator
        run: npm ci

      - name: Run quality checks (lint + format + test with coverage)
        working-directory: ./x402_facilitator
        run: npm run check
        env:
          NODE_ENV: test
          CI: true

      - name: Upload coverage reports to Codecov (optional)
        uses: codecov/codecov-action@v3
        with:
          directory: ./x402_facilitator/coverage
          flags: x402-facilitator
          name: x402-facilitator-coverage
          fail_ci_if_error: false
        continue-on-error: true
