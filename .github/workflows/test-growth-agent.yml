name: Test Growth Agent

permissions:
  contents: read

on:
  pull_request:
    paths:
      - "growth-agent/**"
      - ".github/workflows/test-growth-agent.yml"
  push:
    branches:
      - main
    paths:
      - "growth-agent/**"
      - ".github/workflows/test-growth-agent.yml"

jobs:
  test-growth-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: ./growth-agent
        run: uv sync --all-extras

      - name: Lint
        working-directory: ./growth-agent
        run: uv run ruff check .

      - name: Format check
        working-directory: ./growth-agent
        run: uv run ruff format --check .

      - name: Type check
        working-directory: ./growth-agent
        run: uv run mypy .

      - name: Run tests
        working-directory: ./growth-agent
        run: uv run pytest -v
