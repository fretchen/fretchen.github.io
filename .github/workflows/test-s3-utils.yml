name: Test S3 Utils

permissions:
    contents: read

on:
    pull_request:
        paths:
            - "shared/s3-utils/**"
            - ".github/workflows/test-s3-utils.yml"
    push:
        branches:
            - main
        paths:
            - "shared/s3-utils/**"

jobs:
    test-s3-utils:
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: ./shared/s3-utils

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "22"
                  cache: "npm"
                  cache-dependency-path: shared/s3-utils/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Run quality checks (lint + format + test with coverage)
              run: npm run check
              env:
                  CI: true

            - name: Upload coverage reports to Codecov (optional)
              uses: codecov/codecov-action@v3
              with:
                  directory: ./shared/s3-utils/coverage
                  flags: s3-utils
                  name: s3-utils-coverage
                  fail_ci_if_error: false
              continue-on-error: true
