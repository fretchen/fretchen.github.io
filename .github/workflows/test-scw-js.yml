name: Test SCW JS Functions

permissions:
  contents: read

on:
  pull_request:
    paths:
      - "scw_js/**"
      - "shared/chain-utils/**"
      - "shared/s3-utils/**"
      - ".github/workflows/test-scw-js.yml"
  push:
    branches:
      - main
    paths:
      - "scw_js/**"
      - "shared/chain-utils/**"
      - "shared/s3-utils/**"

jobs:
  test-scw-js:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./scw_js

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: |
            scw_js/package-lock.json
            shared/chain-utils/package-lock.json
            shared/s3-utils/package-lock.json

      - name: Install and build chain-utils
        working-directory: ./shared/chain-utils
        run: npm ci && npm run build

      - name: Install and build s3-utils
        working-directory: ./shared/s3-utils
        run: npm ci && npm run build

      - name: Install dependencies
        run: npm ci

      - name: Run quality checks (lint + format + test with coverage)
        run: npm run check
        env:
          NODE_ENV: test
          CI: true
          SKIP_RPC_TESTS: "true"

      - name: Upload coverage reports to Codecov (optional)
        uses: codecov/codecov-action@v3
        with:
          directory: ./scw_js/coverage
          flags: scw-js
          name: scw-js-coverage
          fail_ci_if_error: false
        continue-on-error: true
