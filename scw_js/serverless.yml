service: my-personal-js-cloud

# Read environment variables from a .env file
useDotenv: true

configValidationMode: off
provider:
  name: scaleway
  runtime: node22
  secret:
    SCW_SECRET_KEY: ${env:SCW_SECRET_KEY}
    SCW_ACCESS_KEY: ${env:SCW_ACCESS_KEY}
    IONOS_API_TOKEN: ${env:IONOS_API_TOKEN}
    BFL_API_TOKEN: ${env:BFL_API_TOKEN}
    # Used by sc_llm_x402.ts (llmx402 function) — see LLM_PROVIDERS in llm_service.ts.
    MISTRAL_API_KEY: ${env:MISTRAL_API_KEY}
    NFT_WALLET_PRIVATE_KEY: ${env:NFT_WALLET_PRIVATE_KEY}
    NFT_WALLET_PUBLIC_KEY: ${env:NFT_WALLET_PUBLIC_KEY}
    USDC_PAYMENT_AMOUNT: ${env:USDC_PAYMENT_AMOUNT, "70000"}
    OWNER_ETH_ADDRESS: ${env:OWNER_ETH_ADDRESS}
    LLM_ESTIMATED_TOKENS_PER_MESSAGE: ${env:LLM_ESTIMATED_TOKENS_PER_MESSAGE, "2000"}
    LLM_WITHDRAW_DELAY_SECONDS: ${env:LLM_WITHDRAW_DELAY_SECONDS, "86400"}
    RECEIVER_AUTHORIZER_PRIVATE_KEY: ${env:RECEIVER_AUTHORIZER_PRIVATE_KEY}
    # Per-network RPC endpoints (see getRpcUrl in @fretchen/chain-utils). Unset => viem
    # falls back to the public endpoint, which is aggressively rate-limited under real
    # traffic. A real value here embeds an API key (e.g. an Alchemy URL) — secret, not env.
    RPC_URL_EIP155_10: ${env:RPC_URL_EIP155_10, ''}
    RPC_URL_EIP155_8453: ${env:RPC_URL_EIP155_8453, ''}
    RPC_URL_EIP155_11155420: ${env:RPC_URL_EIP155_11155420, ''}
    RPC_URL_EIP155_84532: ${env:RPC_URL_EIP155_84532, ''}

plugins:
  - serverless-scaleway-functions

package:
  patterns:
    # Exclude everything by default, then re-include only what the deployed
    # functions actually need. The previous allowlist-shaped patterns below
    # (without a leading "!**") did NOT act as an allowlist — Scaleway's
    # serverless plugin still zips the whole service directory by default,
    # which silently dragged in scw_js/notebooks/ (a 400MB+ local Deno/Jupyter
    # dev environment with its own node_modules) into every function's
    # deploy package, tripping Scaleway's function-size limit.
    - "!**"
    - "dist/**"
    - "!dist/**/*.map"

functions:
  genimgx402token:
    handler: dist/genimg_x402_token.handle
    description: "x402 v2 Token Payment - Paid image generation with USDC"
    custom_domains:
      - imagegen-agent.fretchen.eu
  llmx402:
    handler: dist/sc_llm_x402.handle
    description: "x402 batch-settlement LLM chat (USDC payment channels)"
    custom_domains:
      - llm-agent.fretchen.eu
  llmx402cron:
    handler: dist/llm_x402_cron.handle
    description: "Claims and settles accumulated x402 batch-settlement channels every 12h"
    events:
      - schedule:
          # Scaleway's cron validator (serverless-scaleway-functions/shared/validate.js)
          # doesn't support the standard */N step syntax (its regex requires digits on
          # both sides of the "/") — "0/12" (start at 0, every 12h) works, "*/12" doesn't.
          rate: "0 0/12 * * *"
  growthapi:
    handler: dist/growth_api.handle
    description: "Growth Agent API - draft approval with wallet auth"
    minScale: 0
    maxScale: 1
