service: x402-facilitator

# Read environment variables from a .env file
useDotenv: true

configValidationMode: off
provider:
  name: scaleway
  runtime: node22
  # Environment variables for production
  env:
    NODE_ENV: production
    LOG_LEVEL: info
    # Fee amount in USDC smallest unit (6 decimals): 10000 = 0.01 USDC
    FACILITATOR_FEE_AMOUNT: "10000"
    # batch-settlement recipient whitelist (payTo, not the payer) — see x402_whitelist.ts.
    # Without a match, every batch-settlement request is rejected with recipient_not_whitelisted.
    #
    # Two tiers, deliberately different trust levels:
    #   MANUAL_WHITELIST — production allowlist, applies on ANY network incl. mainnet.
    #   TEST_WALLETS     — convenience tier, fenced behind isTestnet() so a testnet entry
    #                      can never authorize real funds. Keep testnet-only wallets here.
    BATCH_SETTLEMENT_MANUAL_WHITELIST: ${env:BATCH_SETTLEMENT_MANUAL_WHITELIST, ''}
    BATCH_SETTLEMENT_TEST_WALLETS: ${env:BATCH_SETTLEMENT_TEST_WALLETS, ''}
  # Secrets (set via Scaleway Console or CLI)
  secret:
    FACILITATOR_WALLET_PRIVATE_KEY: ${env:FACILITATOR_WALLET_PRIVATE_KEY}
    # Per-network RPC endpoints (see getRpcUrl in chain_utils.ts). Unset => viem falls
    # back to the chain's public endpoint, which is aggressively rate-limited: a single
    # batch-settlement deposit does a Multicall3 read batch and fails with "over rate
    # limit", surfacing as the generic ..._deposit_transaction_failed. Set these for any
    # network carrying real traffic. A real value embeds an API key (e.g. an Alchemy
    # URL) — secret, not env.
    RPC_URL_EIP155_8453: ${env:RPC_URL_EIP155_8453, ''}
    RPC_URL_EIP155_10: ${env:RPC_URL_EIP155_10, ''}
    RPC_URL_EIP155_84532: ${env:RPC_URL_EIP155_84532, ''}
    RPC_URL_EIP155_11155420: ${env:RPC_URL_EIP155_11155420, ''}

plugins:
  - serverless-scaleway-functions

package:
  patterns:
    # Exclude everything, then include ONLY the bundled runtime output.
    # (tsup inlines all deps into dist/*.js, so nothing else is needed at runtime.)
    # This is robust: it won't accidentally package new large dirs like
    # notebooks/node_modules (created by Deno), which previously bloated the
    # upload archive past Scaleway's limit.
    - "!**"
    - "dist/**"
    - "!dist/**/*.map"

functions:
  # Single function with path-based routing
  # Handles /verify, /settle, and /supported endpoints
  facilitator:
    handler: dist/x402_facilitator.handle
    description: x402 v2 payment facilitator with path-based routing
    # Memory and timeout for the combined function
    memoryLimit: 512
    timeout: 60s
    # Custom domain for x402 standard compliance
    custom_domains:
      - facilitator.fretchen.eu
