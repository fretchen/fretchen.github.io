service: x402-facilitator

# Read environment variables from a .env file
useDotenv: true

configValidationMode: off
provider:
  name: scaleway
  runtime: node22
  # Environment variables for production
  env:
    NODE_ENV: production
    LOG_LEVEL: info
    # Fee amount in USDC smallest unit (6 decimals): 10000 = 0.01 USDC
    FACILITATOR_FEE_AMOUNT: "10000"
  # Secrets (set via Scaleway Console or CLI)
  secret:
    FACILITATOR_WALLET_PRIVATE_KEY: ${env:FACILITATOR_WALLET_PRIVATE_KEY}

plugins:
  - serverless-scaleway-functions

package:
  patterns:
    # Exclude everything, then include ONLY the bundled runtime output.
    # (tsup inlines all deps into dist/*.js, so nothing else is needed at runtime.)
    # This is robust: it won't accidentally package new large dirs like
    # notebooks/node_modules (created by Deno), which previously bloated the
    # upload archive past Scaleway's limit.
    - "!**"
    - "dist/**"
    - "!dist/**/*.map"

functions:
  # Single function with path-based routing
  # Handles /verify, /settle, and /supported endpoints
  facilitator:
    handler: dist/x402_facilitator.handle
    description: x402 v2 payment facilitator with path-based routing
    # Memory and timeout for the combined function
    memoryLimit: 512
    timeout: 60s
    # Custom domain for x402 standard compliance
    custom_domains:
      - facilitator.fretchen.eu
